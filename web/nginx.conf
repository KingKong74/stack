server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # SPA: serve index.html for any non-file route.
  location / {
    try_files $uri $uri/ /index.html;
  }

  # Reverse-proxy API calls to the server container on the compose network.
  location /api/ {
    proxy_pass http://server:4000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 60s;
  }

  # The web terminal: websocket through to the host PTY daemon
  # (terminal/stack-term.mjs). host.docker.internal maps to the host gateway
  # via extra_hosts in docker-compose.yml; when the daemon isn't running the
  # socket simply fails and the Terminal screen says so.
  location /term {
    proxy_pass http://host.docker.internal:7703;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_read_timeout 12h;
    proxy_send_timeout 12h;
  }

  # Long-cache hashed assets.
  location /assets/ {
    expires 30d;
    add_header Cache-Control "public, immutable";
  }
}
