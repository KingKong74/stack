server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # SPA: serve index.html for any non-file route.
  location / {
    try_files $uri $uri/ /index.html;
  }

  # Reverse-proxy API calls to the server container on the compose network.
  location /api/ {
    proxy_pass http://server:4000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 60s;
  }

  # The web terminal: websockets to the server's relay (server/src/term.js).
  # The prefix match covers both /term (browsers) and /term-agent (the host
  # daemon's outbound connection). When the daemon isn't connected the relay
  # tells the Terminal screen so.
  location /term {
    proxy_pass http://server:4000;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_read_timeout 12h;
    proxy_send_timeout 12h;
  }

  # Long-cache hashed assets.
  location /assets/ {
    expires 30d;
    add_header Cache-Control "public, immutable";
  }
}
