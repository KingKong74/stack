services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-stack}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${POSTGRES_DB:-stack}
    volumes:
      - stack_db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-stack}"]
      interval: 5s
      timeout: 5s
      retries: 10

  server:
    build: ./server
    restart: unless-stopped
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-stack}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-stack}
      API_TOKEN: ${API_TOKEN:?set API_TOKEN in .env}
      # Optional: enables the in-app Gemini features (Judge assist). Absent =
      # those routes report themselves unavailable; nothing else changes.
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_MODEL: ${GEMINI_MODEL:-}
      PORT: 4000
    depends_on:
      db:
        condition: service_healthy

  web:
    build: ./web
    restart: unless-stopped
    ports:
      # Dokploy / Cloudflare Tunnel point at this. Change the host port if 8787 clashes.
      - "${WEB_PORT:-8787}:80"
    depends_on:
      - server

volumes:
  stack_db:
